// ─── SCHEDULE MODAL ──────────────────────────────────────────────────────────
function openScheduleModal(pId, completedPi, completedDate) {
  const p = projects.find(x=>x.id===pId);
  const completedPh = p.phases[completedPi];
  const nextPi = completedPi + 1;
  const nextPh = p.phases[nextPi];
  if (!nextPh) return;

  const dur = PHASE_DURATIONS[nextPh.name] || 30;
  const suggested = addDays(completedDate, dur);

  document.getElementById('sm-title').textContent = `Ph.${completedPh.id} complete — schedule next phase`;
  document.getElementById('sm-completed-msg').textContent = `✓ ${completedPh.name} completed ${fmtDate(completedDate)}`;
  document.getElementById('sm-next-msg').innerHTML = `Next up: <strong>Ph.${nextPh.id}: ${nextPh.name}</strong><br><span style="font-size:12px;color:var(--text2)">Owner: ${PARTNERS[nextPh.owner]?.company||nextPh.owner}</span>`;
  document.getElementById('sm-calc-note').textContent = `Suggested: ${fmtDate(completedDate)} + ${dur} days (default) = ${fmtDate(suggested)}`;
  document.getElementById('sm-task-note').textContent = `${nextPh.tasks.length} tasks will be spaced over ${dur} days`;
  document.getElementById('sm-date').value = suggested;
  document.getElementById('sm-pid').value = pId;
  document.getElementById('sm-next-pi').value = nextPi;
  document.getElementById('schedule-modal').classList.add('open');
}

function closeScheduleModal() {
  document.getElementById('schedule-modal').classList.remove('open');
}

function acceptSchedule() {
  const pId = parseInt(document.getElementById('sm-pid').value);
  const nextPi = parseInt(document.getElementById('sm-next-pi').value);
  const dueDate = document.getElementById('sm-date').value;
  const autoTasks = document.getElementById('sm-auto-tasks').checked;
  const p = projects.find(x=>x.id===pId);
  const ph = p.phases[nextPi];

  ph.dueDate = dueDate;
  // Set startDate = today (phase is now active)
  ph.startDate = new Date().toISOString().split('T')[0];

  if (autoTasks) {
    const dur = PHASE_DURATIONS[ph.name] || 30;
    ph.tasks.forEach((t,ti) => {
      if (!t.done) t.dueDate = addDays(ph.startDate, Math.round(dur * (ti+1) / ph.tasks.length));
    });
  }

  closeScheduleModal();
  renderAll();
  if (drilldownProjectId) renderDrilldown();
}

// ─── GANTT ───────────────────────────────────────────────────────────────────
function renderGantt(pId) {
  const p = projects.find(x=>x.id===pId);
  if (!p) return '';

  const today = '2026-04-10';

  // Build gantt rows from phases and tracks
  const rows = [];
  p.phases.forEach(ph => {
    if (ph.id < 5) {
      rows.push({
        label: `Ph.${ph.id} ${ph.name}`,
        start: ph.startDate,
        end: ph.completedDate || ph.dueDate,
        due: ph.dueDate,
        done: ph.done,
        overdue: ph.overdue && !ph.done,
        active: !ph.done && p.phases.find(x=>!x.done) === ph,
        indent: 0,
      });
    } else {
      rows.push({label:'Ph.5 Construction', start:ph.startDate, end:ph.dueDate, due:ph.dueDate, done:ph.done, overdue:false, active:!ph.done, indent:0, isHeader:true});
      if (ph.parallelTracks) {
        Object.values(ph.parallelTracks).flat().forEach(tr => {
          rows.push({
            label: tr.name,
            start: tr.startDate,
            end: tr.completedDate || tr.dueDate,
            due: tr.dueDate,
            done: tr.done,
            overdue: false,
            active: !tr.done,
            indent: 1,
          });
        });
      }
    }
  });

  // Find date range
  const allDates = rows.flatMap(r=>[r.start,r.end,r.due]).filter(Boolean);
  if (!allDates.length) return '<div style="padding:20px;color:var(--text2);font-size:13px">No schedule data yet. Complete phases to build the timeline.</div>';

  const minDate = allDates.reduce((a,b)=>a<b?a:b);
  const maxDate = allDates.reduce((a,b)=>a>b?a:b);
  const totalDays = Math.max(daysBetween(minDate, maxDate), 1);
  const todayPct = Math.max(0, Math.min(100, daysBetween(minDate, today) / totalDays * 100));

  const rowH = 32;
  const labelW = 180;
  const chartW = 520;
  const H = rows.length * rowH + 36;

  const monthLabels = [];
  let cur = new Date(minDate); cur.setDate(1);
  while (cur.toISOString().split('T')[0] <= maxDate) {
    const pct = daysBetween(minDate, cur.toISOString().split('T')[0]) / totalDays * 100;
    if (pct >= 0 && pct <= 100) {
      monthLabels.push({label: cur.toLocaleDateString('en-US',{month:'short',year:'2-digit'}), pct});
    }
    cur.setMonth(cur.getMonth()+1);
  }

  const barsHTML = rows.map((r,i) => {
    if (!r.start || !r.end) return '';
    const x1 = Math.max(0, daysBetween(minDate, r.start) / totalDays * 100);
    const x2 = Math.min(100, daysBetween(minDate, r.end) / totalDays * 100);
    const w = Math.max(x2 - x1, 0.5);
    const y = i * rowH + 24;
    const color = r.done ? 'var(--green)' : r.overdue ? 'var(--red)' : r.active ? 'var(--accent)' : 'var(--text3)';
    const opacity = r.isHeader ? '0' : r.indent ? '0.85' : '1';
    const barH = r.indent ? 10 : 14;
    const barY = y + (rowH - barH) / 2 - 4;
    return `<rect x="${labelW + x1/100*chartW}" y="${barY}" width="${w/100*chartW}" height="${barH}" rx="3" fill="${color}" opacity="${opacity}"/>
      ${r.done && r.completedDate ? `<line x1="${labelW + daysBetween(minDate,r.completedDate)/totalDays*chartW}" y1="${barY}" x2="${labelW + daysBetween(minDate,r.completedDate)/totalDays*chartW}" y2="${barY+barH}" stroke="white" stroke-width="2" opacity="0.7"/>` : ''}`;
  }).join('');

  const labelsHTML = rows.map((r,i) => {
    const y = i * rowH + 24 + rowH/2 - 2;
    const x = r.indent ? 14 : 4;
    const weight = r.isHeader ? '600' : r.indent ? '400' : '500';
    const fsize = r.indent ? '10' : '11';
    const color = r.done ? 'var(--green-text)' : r.overdue ? 'var(--red-text)' : 'var(--text)';
    return `<text x="${x}" y="${y}" font-size="${fsize}" font-weight="${weight}" fill="${color}" dominant-baseline="middle">${r.label.length > 20 ? r.label.slice(0,19)+'…' : r.label}</text>`;
  }).join('');

  const gridHTML = monthLabels.map(m =>
    `<line x1="${labelW + m.pct/100*chartW}" y1="18" x2="${labelW + m.pct/100*chartW}" y2="${H}" stroke="var(--border)" stroke-width="0.5"/>
     <text x="${labelW + m.pct/100*chartW + 3}" y="13" font-size="9" fill="var(--text3)">${m.label}</text>`
  ).join('');

  return `<div style="overflow-x:auto">
    <svg width="${labelW+chartW+10}" height="${H}" style="font-family:inherit;display:block">
      ${gridHTML}
      <line x1="${labelW + todayPct/100*chartW}" y1="18" x2="${labelW + todayPct/100*chartW}" y2="${H}" stroke="var(--red)" stroke-width="1.5" stroke-dasharray="4,2"/>
      <text x="${labelW + todayPct/100*chartW + 3}" y="13" font-size="9" fill="var(--red-text)">Today</text>
      ${barsHTML}
      ${labelsHTML}
    </svg>
  </div>
  <div style="display:flex;gap:14px;margin-top:8px;flex-wrap:wrap">
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:8px;background:var(--green);border-radius:2px"></div><span style="font-size:11px;color:var(--text2)">Complete</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:8px;background:var(--accent);border-radius:2px"></div><span style="font-size:11px;color:var(--text2)">Active</span></div>
    <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:8px;background:var(--red);border-radius:2px"></div><span style="font-size:11px;color:var(--text2)">Overdue</span></div>

function togglePhaseAllTasks(pId, pi) {
  const p = projects.find(x=>x.id===pId);
  const ph = p.phases[pi];
  const today = new Date().toISOString().split('T')[0];
  if (ph.parallelTracks) {
    const allDone = Object.values(ph.parallelTracks).flat().every(tr=>tr.tasks.every(t=>t.done));
    Object.values(ph.parallelTracks).flat().forEach(tr=>{
      tr.tasks.forEach(t=>{t.done=!allDone; t.completedDate=!allDone?today:null;});
      tr.done=!allDone;
    });
    ph.done=!allDone;
    ph.completedDate=!allDone?today:null;
  } else {
    const tasks = allPhaseTasks(ph);
    const allDone = tasks.every(t=>t.done);
    // Toggle all tasks including those in groups
    ph.tasks.forEach(t => {
      if (t.isGroup) t.tasks.forEach(gt=>{gt.done=!allDone; gt.completedDate=!allDone?today:null;});
      else { t.done=!allDone; t.completedDate=!allDone?today:null; }
    });
    ph.done=!allDone;
    ph.completedDate=!allDone?today:null;
  }
  renderAll();
  if (ph.done) {
    const nextPh = p.phases[pi+1];
    if (nextPh && !nextPh.done) openScheduleModal(pId, pi, ph.completedDate);
  }
}

function toggleGate(pId, pi, gi) {

  const g = p.phases[pi].gateChecklist[gi];
  g.done = !g.done;

}

function toggleTrack(pId, trackKey, trIdx) {

function toggleTrackTask(pId, trackKey, trIdx, ti) {
  const p = projects.find(x=>x.id===pId);
  const tr = p.phases[4].parallelTracks[trackKey][trIdx];
  const t = tr.tasks[ti];
  t.done = !t.done;
  t.completedDate = t.done ? new Date().toISOString().split('T')[0] : null;
  if (tr.tasks.every(t=>t.done)) { tr.done=true; tr.completedDate=new Date().toISOString().split('T')[0]; }
  renderAll();
}

function toggleTrackAll(pId, trackKey, trIdx) {
  const p = projects.find(x=>x.id===pId);
  const tr = p.phases[4].parallelTracks[trackKey][trIdx];
  const allDone = tr.tasks.every(t=>t.done);
  const today = new Date().toISOString().split('T')[0];
  tr.tasks.forEach(t=>{t.done=!allDone; t.completedDate=!allDone?today:null;});
  tr.done=!allDone;
  if (!allDone) tr.completedDate=today;
  renderAll();
}

function markPhaseDone(pId, pi) {
  const p = projects.find(x=>x.id===pId);
  const ph = p.phases[pi];
  const today = new Date().toISOString().split('T')[0];
  ph.done=true; ph.overdue=false;
  if (!ph.completedDate) ph.completedDate=today;
  if (ph.parallelTracks) Object.values(ph.parallelTracks).flat().forEach(tr=>{
    tr.done=true; if(!tr.completedDate) tr.completedDate=today;
    tr.tasks.forEach(t=>{t.done=true; if(!t.completedDate) t.completedDate=today;});
  });
  else ph.tasks.forEach(t=>{t.done=true; if(!t.completedDate) t.completedDate=today;});
  ph.gateChecklist.forEach(g=>{g.done=true; if(!g.completedDate) g.completedDate=today;});
  renderAll();
  // Suggest schedule for next phase
  const nextPh = p.phases[pi+1];
  if (nextPh && !nextPh.done) openScheduleModal(pId, pi, ph.completedDate);
}

let dpCallback = null;

function openDP(label, currentVal, callback, event) {
  dpCallback = callback;
  document.getElementById('dp-label').textContent = label;
  document.getElementById('dp-input').value = currentVal || '';
  const popup = document.getElementById('dp-popup');
  popup.classList.add('open');
  // Position near click
  const x = Math.min(event.clientX, window.innerWidth - 240);
  const y = Math.min(event.clientY + 10, window.innerHeight - 160);
  popup.style.left = x + 'px';
  popup.style.top = y + 'px';
  setTimeout(() => document.getElementById('dp-input').focus(), 50);
}

function confirmDP() {
  const val = document.getElementById('dp-input').value;
  if (dpCallback) dpCallback(val || null);
  closeDP();
}

function clearDP() {
  if (dpCallback) dpCallback(null);
  closeDP();
}

function toggleNotifPanel() {
  const panel = document.getElementById('notif-panel');
  const overlay = document.getElementById('notif-overlay');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  overlay.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) {
    renderNotifications();
    // Move rendered HTML to panel body
    const body = document.getElementById('notif-panel-body');
    const src = document.getElementById('notif-view');
    body.innerHTML = src.innerHTML;
  }
}

function closeDP() {
  document.getElementById('dp-popup').classList.remove('open');
  dpCallback = null;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDP(); });
document.addEventListener('keydown', e => { if (e.key === 'Enter' && document.getElementById('dp-popup').classList.contains('open')) confirmDP(); });

// Reminders
function draftAndLog(pId, phaseName) {
  const p = projects.find(x=>x.id===pId);
  const ph = p.phases.find(x=>x.name===phaseName);
  if (!ph) return;
  const owner = ph.owner;
  const r = PARTNERS[owner]||{};
  const late = ph.overdue&&!ph.done;
  const blocked = ph.gateChecklist.filter(g=>!g.done).map(g=>`  · ${g.item}`).join('\n');
  const subj = late ? `Action needed: ${phaseName} overdue — ${p.name}` : `Reminder: ${phaseName} — ${p.name}`;
  const body = `Hi ${owner.split(' ')[0]},\n\n${late
    ? `The ${phaseName} phase on ${p.name} (${p.address}) is past its due date.`
    : `This is a reminder regarding the ${phaseName} phase on ${p.name} (${p.address}).`}\n\nOutstanding gate checklist items:\n${blocked||'  · All gate items complete'}\n${ph.drawAmount?`\nDraw amount: ${fmt(ph.drawAmount)}${ph.drawPaid?' (paid)':' (pending)'}`:''}${ph.note?`\nNote: ${ph.note}`:''}\n\nPlease reply with a status update.\n\nThanks,\nNeovi Project Operations`;
  document.getElementById('e-to').value=r.email||'';
  document.getElementById('e-subj').value=subj;
  document.getElementById('e-body').value=body;
  document.getElementById('email-modal').classList.add('open');
  const key=`${pId}_${phaseName}`;
  if(!reminderLog[key])reminderLog[key]=[];
  reminderLog[key].push(Date.now());
  renderOverdue(); renderNotifications();
}
